<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizing Elon's $1 Trillion</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --money-color: #00ff88;
            --grid-line: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-color: #ffd700;
            --block-size: 30px;
            --gap: 2px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 100%;
            position: relative;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid #333;
        }

        .title-group h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--accent-color);
        }

        .title-group p {
            margin: 0;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        #counter {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2rem;
            font-weight: bold;
            color: var(--money-color);
            will-change: contents;
        }

        main {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            padding: 20px 0;
            width: 100%;
            margin: 0;
        }

        #visualization {
            display: contents;
        }

        /* Spacer for the left to push blocks to center */
        #left-spacer {
            pointer-events: none;
            min-width: 0;
        }

        #blocks-container {
            grid-column: 2;
            width: calc(var(--block-size) * 10);
            background-image: 
                linear-gradient(90deg, var(--grid-line) var(--gap), transparent var(--gap)),
                linear-gradient(0deg, var(--grid-line) var(--gap), transparent var(--gap));
            background-size: var(--block-size) var(--block-size);
            background-color: var(--money-color);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
        }

        #milestones {
            grid-column: 3;
            position: relative;
            min-width: 0;
            padding-right: 15px; /* Add breathing room for labels on mobile */
        }

        .tick {
            position: absolute;
            height: 20px;
            width: 100%;
            display: flex;
            align-items: center;
            pointer-events: none;
            transform: translateY(-50%);
        }

        #milestones .tick {
            left: 0;
            justify-content: flex-start;
            gap: 8px;
        }

        #milestones .tick::before {
            content: '';
            height: 1px;
            width: 15px;
            background: #555;
            flex-shrink: 0;
        }

        #milestones .tick span {
            font-size: 13px;
            color: #888;
            white-space: nowrap;
        }

        #milestones .tick.major::before {
            width: 25px;
            background: var(--accent-color);
        }

        #milestones .tick.major span {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 13px;
        }

        @media (min-width: 768px) {
            main {
                gap: 40px;
                padding: 20px 40px;
            }
            #milestones .tick span { font-size: 14px; }
            #milestones .tick.major span { font-size: 14px; }
            header { height: 80px; padding: 0 40px; }
            #counter { font-size: 2rem; }
        }

        @media (max-width: 767px) {
            :root {
                --block-size: 25px; /* Smaller blocks for mobile */
            }
            header {
                flex-direction: column;
                height: auto;
                padding: 10px;
                text-align: center;
                backdrop-filter: none;
                background: rgba(10, 10, 10, 0.98);
            }
            .title-group h1 { font-size: 1.1rem; }
            #counter { font-size: 1.4rem; margin-top: 5px; }
            #intro { margin-top: 120px; padding: 0 15px; }
            #milestones .tick span { 
                white-space: normal; /* Allow wrapping to keep labels inside viewport */
                line-height: 1.2;
                max-width: 80px; /* Limit width so it doesn't push the screen */
                font-size: 12px;
            }
            #milestones .tick.major span {
                font-size: 12px;
            }
        }

        #intro {
            max-width: 600px;
            margin: 100px auto 20px auto;
            text-align: center;
            line-height: 1.6;
            min-height: 200px;
        }

        .highlight {
            color: var(--money-color);
            font-weight: bold;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .swatch {
            width: 15px;
            height: 15px;
            background: var(--money-color);
            border: 1px solid var(--grid-line);
        }

        #scroll-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
            opacity: 0.7;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #scroll-hint.hidden {
            opacity: 0;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }
    </style>
</head>
<body>

<header>
    <div class="title-group">
        <h1>Elon Musk: The $1 Trillion Net Worth</h1>
        <p>A visualization of unfathomable wealth</p>
    </div>
    <div id="counter">$0</div>
</header>

<div id="intro">
    <p>Each small block represents <span class="highlight">$1,000,000</span>.</p>
    <p>Median US Household Income: <a href="https://www.census.gov/library/publications/2024/demo/p60-282.html" target="_blank" style="color: var(--accent-color); text-decoration: underline;">$80,610 (2023 Census Data)</a></p>
    <p>Each row of 10 blocks represents <span class="highlight">$10,000,000</span>.</p>
    <div class="legend">
        <div class="legend-item"><div class="swatch"></div> = $1 Million</div>
        <div class="legend-item">Row = $10 Million</div>
    </div>
</div>

<main>
    <div id="visualization">
        <div id="left-spacer"></div>
        <div id="blocks-container"></div>
        <div id="milestones"></div>
    </div>
</main>

<div id="scroll-hint">Scroll Down ↓</div>

<script>
    const counter = document.getElementById('counter');
    const milestones = document.getElementById('milestones');
    const blocksContainer = document.getElementById('blocks-container');
    
    const ROW_VALUE = 10000000; // $10 Million per row
    const TOTAL_WEALTH = 1000000000000; // $1 Trillion

    let currentBlockSize = 30;

    function updateBlockSize() {
        currentBlockSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--block-size')) || 30;
    }

    // Generate milestones
    function generateMilestones() {
        milestones.innerHTML = '';
        const fragment = document.createDocumentFragment();
        
        // Every $100M (10,000 labels total potential, but we only show 1,000 labels)
        for (let i = 0; i <= 10000; i++) {
            const amount = i * 100000000;
            if (amount > TOTAL_WEALTH) break;

            const isBillion = amount % 1000000000 === 0;
            const isFirstFewMillions = i < 10;
            
            // Only create an element if it's a Billion or one of the first few Millions
            // This keeps the DOM small while showing the key labels.
            if (isBillion || isFirstFewMillions) {
                const tick = document.createElement('div');
                tick.className = isBillion ? 'tick major' : 'tick';
                tick.style.top = `${(amount / ROW_VALUE) * currentBlockSize}px`;

                const label = document.createElement('span');
                if (amount >= 1000000000000) {
                    label.textContent = `ELON MUSK ($1T)`;
                } else if (isBillion) {
                    label.textContent = `$${(amount / 1000000000).toFixed(0)} Billion`;
                } else {
                    label.textContent = `$${(amount / 1000000).toFixed(0)} Million`;
                }
                tick.appendChild(label);
                fragment.appendChild(tick);
            }
        }

        milestones.appendChild(fragment);
        
        // Update container height based on block size
        const totalRows = TOTAL_WEALTH / ROW_VALUE;
        blocksContainer.style.height = `${totalRows * currentBlockSize}px`;
    }

    let ticking = false;
    let blocksOffsetTop = 0;
    let headerHeight = 0;

    function updateCounter() {
        if (!ticking) {
            window.requestAnimationFrame(() => {
                const scrollY = window.scrollY || window.pageYOffset;
                // Calculate wealth based on how much of the blocks-container has passed the header
                const relativeScroll = Math.max(0, scrollY - blocksOffsetTop + headerHeight);
                
                const rowsScrolled = relativeScroll / currentBlockSize;
                let currentWealth = Math.floor(rowsScrolled * ROW_VALUE);
                
                if (currentWealth > TOTAL_WEALTH) currentWealth = TOTAL_WEALTH;
                
                counter.textContent = `$${currentWealth.toLocaleString()}`;
                
                // Update scroll hint
                const scrollHint = document.getElementById('scroll-hint');
                if (scrollY > 50) {
                    scrollHint.classList.add('hidden');
                } else {
                    scrollHint.classList.remove('hidden');
                }
                ticking = false;
            });
            ticking = true;
        }
    }

    function init() {
        updateBlockSize();
        const header = document.querySelector('header');
        headerHeight = header.offsetHeight;
        
        // Use getBoundingClientRect + scrollY for a more robust absolute offset
        const rect = blocksContainer.getBoundingClientRect();
        blocksOffsetTop = rect.top + window.scrollY;
        
        generateMilestones();
        updateCounter();
    }

    window.addEventListener('scroll', updateCounter, { passive: true });
    window.addEventListener('resize', () => {
        init();
    });
    window.addEventListener('load', init);
</script>

</body>
</html>
